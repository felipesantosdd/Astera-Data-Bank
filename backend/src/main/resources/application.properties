spring.application.name=astera-data-bank

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/astera_data_bank
spring.datasource.username=astera
spring.datasource.password=astera
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
# O banco ja foi populado pelo script Python antes do Flyway existir.
# baseline-on-migrate=true diz: "se o banco nao esta vazio, crie o historico
# e considere tudo ate a baseline-version como ja aplicado."
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=2

# Actuator
management.endpoints.web.exposure.include=health,info
