services:
  postgres:
    image: postgres:16-alpine
    container_name: astera-postgres
    environment:
      POSTGRES_DB: astera_data_bank
      POSTGRES_USER: astera
      POSTGRES_PASSWORD: astera
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
